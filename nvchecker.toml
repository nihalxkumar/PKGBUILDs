[__config__]
oldver = "old_versions.txt"
newver = "old_versions.txt"

[contextpilot]
source = "github"
github = "krshrimali/context-pilot-rs"

[contextpilot-git]
source = "git"
git = "https://github.com/krshrimali/context-pilot-rs.git"
use_commit = true
branch = "main"

[terminal-rain-lightning]
source = "github"
github = "rmaake1/terminal-rain-lightning"
pypi = "terminal-rain-lightning"

[twmd-bin]
source = "github"
github = "mmpx12/twitter-media-downloader"

[twmd-git]
source = "github"
github = "mmpx12/twitter-media-downloader"
use_commit = true
branch = "master"

[smithery-cli]
source = "github"
github = "smithery-ai/cli"
use_latest_release = true

[ensu-bin]
source = "github"
github = "ente-io/ente"
# ente-io/ente is a monorepo that tags every product, so restrict to the
# ensu-v* tags and pick the highest version. use_max_tag (not use_latest_tag)
# is required because nvchecker only honours include_regex/exclude_regex for
# the max-tag/max-release sources. exclude_regex drops pre-releases like
# ensu-v0.1.18-beta so we don't auto-propose beta builds.
use_max_tag = true
include_regex = "ensu-v.*"
exclude_regex = ".*-(alpha|beta|rc).*"
prefix = "ensu-v"

[relax-player]
source = "github"
github = "ebithril/relax-player"

[onionmine]
source = "git"
git = "https://gitlab.torproject.org/tpo/onion-services/onionmine.git"
tag_strip = "v"

[onionmine-git]
source = "git"
git = "https://gitlab.torproject.org/tpo/onion-services/onionmine.git"
use_commit = true
branch = "main"

[onionspray]
source = "git"
git = "https://gitlab.torproject.org/tpo/onion-services/onionspray.git"
tag_strip = "v"

[onionspray-git]
source = "git"
git = "https://gitlab.torproject.org/tpo/onion-services/onionspray.git"
use_commit = true
branch = "main"
