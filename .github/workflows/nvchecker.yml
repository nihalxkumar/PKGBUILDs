name: Check for new versions

on:
  schedule:
    # Run every 12 hours
    - cron: '0 */12 * * *'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  check-versions:
    runs-on: ubuntu-latest
    container:
      image: python:3.13-alpine
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: apk add --no-cache build-base curl-dev python3-dev git

      - name: Install nvchecker
        run: pip install nvchecker

      - name: Run nvchecker
        run: nvchecker -c nvchecker.toml

      - name: Check for version changes
        id: check
        shell: python3
        run: |
          import subprocess, os
          r = subprocess.run(['git', 'diff', '--exit-code', 'old_versions.txt'], capture_output=True)
          if r.returncode != 0:
              env = os.environ['GITHUB_ENV']
              with open(env, 'a') as f:
                  f.write('UPDATES_FOUND=true\n')
                  diff = subprocess.run(['git', 'diff', 'old_versions.txt'], capture_output=True, text=True).stdout
                  f.write(f'DIFF<<EOF\n{diff}\nEOF\n')
          else:
              print('No version changes detected')

      - name: Create issue if updates available
        if: env.UPDATES_FOUND == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const diff = process.env.DIFF;
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Package updates available',
              body: 'nvchecker detected updated versions:\n\n```diff\n' + diff + '\n```',
              labels: ['dependencies', 'automated']
            })
