name: Check for new versions

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential libcurl4-openssl-dev

      - name: Install nvchecker
        run: pip install nvchecker

      - name: Setup nvchecker keyfile
        run: |
          cat > /tmp/keyfile.toml << 'KEYEOF'
          [keys]
          github = '${{ github.token }}'
          KEYEOF

      - name: Save current versions
        run: cp old_versions.txt /tmp/old_versions.txt

      - name: Run nvchecker
        run: nvchecker -c nvchecker.toml --keyfile /tmp/keyfile.toml

      - name: Detect version changes
        id: detect
        run: |
          # Keep a human-readable diff for the PR body.
          diff -u /tmp/old_versions.txt old_versions.txt > /tmp/diff_output.txt || true
          # Compare the two nvchecker JSON files directly. Relying on the unified
          # diff is fragile: on a version bump only the "version" line is marked
          # with "+", while the package-name line stays as unchanged context, so
          # scraping package names from "+" lines never matched and the version
          # map ended up empty.
          rm -f /tmp/version_map.txt
          python3 - <<'PY'
          import json

          def load(path):
              with open(path) as f:
                  return json.load(f).get("data", {})

          old = load("/tmp/old_versions.txt")
          new = load("old_versions.txt")

          changed = []
          for pkg, info in new.items():
              ver = info.get("version")
              if ver and old.get(pkg, {}).get("version") != ver:
                  changed.append((pkg, ver))

          with open("/tmp/version_map.txt", "w") as f:
              for pkg, ver in changed:
                  f.write(f"{pkg}:{ver}\n")

          import os
          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              if changed:
                  out.write("UPDATES_FOUND=true\n")
                  out.write("PACKAGES=" + ",".join(p for p, _ in changed) + "\n")
          PY

      - name: Configure git
        if: steps.detect.outputs.UPDATES_FOUND == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create update branch
        if: steps.detect.outputs.UPDATES_FOUND == 'true'
        id: branch
        run: |
          branch="auto-update/$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$branch"
          echo "BRANCH=${branch}" >> "$GITHUB_OUTPUT"

      - name: Update packages
        if: steps.detect.outputs.UPDATES_FOUND == 'true'
        run: |
          while IFS=: read -r pkg ver; do
            echo "Updating ${pkg} to ${ver}"
            python3 scripts/update-package.py "${pkg}" "${ver}"
          done < /tmp/version_map.txt

      - name: Commit and push
        if: steps.detect.outputs.UPDATES_FOUND == 'true'
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          {
            echo "auto: update packages"
            echo ""
            echo "Updated packages:"
            while IFS=: read -r pkg ver; do
              echo "- ${pkg}: ${ver}"
            done < /tmp/version_map.txt
          } > /tmp/commit_msg.txt
          git commit -F /tmp/commit_msg.txt
          git push origin "${{ steps.branch.outputs.BRANCH }}"

      - name: Create pull request
        if: steps.detect.outputs.UPDATES_FOUND == 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT || github.token }}
        run: |
          # Skip if an auto-update PR is already open to avoid duplicates
          existing=$(gh pr list --state open --json headRefName --jq '[.[].headRefName | select(startswith("auto-update/"))] | length')
          if [ "$existing" -gt 0 ]; then
            echo "An auto-update PR already exists, skipping PR creation."
            exit 0
          fi
          {
            echo "### Updated packages"
            while IFS=: read -r pkg ver; do
              echo "- **${pkg}**: ${ver}"
            done < /tmp/version_map.txt
            echo ""
            echo "### Version diff"
            echo '```diff'
            cat /tmp/diff_output.txt
            echo '```'
          } > /tmp/pr_body.txt
          gh pr create \
            --title "auto: update packages" \
            --body-file /tmp/pr_body.txt \
            --head "${{ steps.branch.outputs.BRANCH }}" \
            --base main \
            --label dependencies,automated
