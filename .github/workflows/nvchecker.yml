name: Check for new versions

on:
  schedule:
    # Run every 12 hours
    - cron: '0 */12 * * *'
  # Allow manual trigger
  workflow_dispatch:

permissions:
  issues: write

jobs:
  check-versions:
    runs-on: ubuntu-latest
    container:
      image: python:3.13-alpine
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: apk add --no-cache build-base curl-dev python3-dev git

      - name: Install nvchecker
        run: pip install nvchecker

      - name: Save current versions
        run: cp old_versions.txt /tmp/old_versions.txt

      - name: Run nvchecker
        run: nvchecker -c nvchecker.toml

      - name: Check for version changes
        id: check
        run: |
          # Compare old vs new versions. If diff is non-empty, updates found.
          diff -u /tmp/old_versions.txt old_versions.txt > /tmp/diff_output.txt || true
          if [ -s /tmp/diff_output.txt ]; then
            echo "UPDATES_FOUND=true" >> "$GITHUB_ENV"
            {
              echo "DIFF<<EOF"
              cat /tmp/diff_output.txt
              echo "EOF"
            } >> "$GITHUB_ENV"
          else
            echo "No version changes detected"
          fi

      - name: Create issue if updates available
        if: env.UPDATES_FOUND == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const diff = process.env.DIFF;
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Package updates available',
              body: 'nvchecker detected updated versions:\n\n```diff\n' + diff + '\n```',
              labels: ['dependencies', 'automated']
            })
