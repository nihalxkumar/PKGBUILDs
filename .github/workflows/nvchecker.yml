name: Check for new versions

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential libcurl4-openssl-dev

      - name: Install nvchecker
        run: pip install nvchecker

      - name: Save current versions
        run: cp old_versions.txt /tmp/old_versions.txt

      - name: Run nvchecker
        run: nvchecker -c nvchecker.toml

      - name: Detect version changes
        id: detect
        run: |
          diff -u /tmp/old_versions.txt old_versions.txt > /tmp/diff_output.txt || true
          if [ -s /tmp/diff_output.txt ]; then
            echo "UPDATES_FOUND=true" >> "$GITHUB_OUTPUT"
            pkgs=""
            while IFS= read -r line; do
              if echo "$line" | grep -qE '^\+\s+"[a-z].*":\s*\{'; then
                pkg=$(echo "$line" | sed 's/^[+ ]*"//;s/":\s*{.*//')
                pkgs="${pkgs}${pkgs:+,}${pkg}"
              fi
            done < /tmp/diff_output.txt
            echo "PACKAGES=${pkgs}" >> "$GITHUB_OUTPUT"
            for pkg in $(echo "$pkgs" | tr ',' ' '); do
              ver=$(grep -A5 "\"${pkg}\":" /tmp/diff_output.txt | grep '"version"' | tail -1 | sed 's/.*"version": *"//;s/".*//')
              echo "${pkg}_VERSION=${ver}" >> "$GITHUB_OUTPUT"
            done
          fi

      - name: Configure git
        if: steps.detect.outputs.UPDATES_FOUND == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create update branch
        if: steps.detect.outputs.UPDATES_FOUND == 'true'
        id: branch
        run: |
          branch="auto-update/$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$branch"
          echo "BRANCH=${branch}" >> "$GITHUB_OUTPUT"

      - name: Update packages
        if: steps.detect.outputs.UPDATES_FOUND == 'true'
        run: |
          for pkg in $(echo "${{ steps.detect.outputs.PACKAGES }}" | tr ',' ' '); do
            ver_var="${pkg}_VERSION"
            new_ver="${!ver_var}"
            if [ -n "$new_ver" ]; then
              echo "Updating ${pkg} to ${new_ver}"
              python3 scripts/update-package.py "${pkg}" "${new_ver}"
            fi
          done

      - name: Commit and push
        if: steps.detect.outputs.UPDATES_FOUND == 'true'
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          echo "auto: update packages" > /tmp/commit_msg.txt
          echo "" >> /tmp/commit_msg.txt
          echo "Updated packages:" >> /tmp/commit_msg.txt
          for pkg in $(echo "${{ steps.detect.outputs.PACKAGES }}" | tr ',' ' '); do
            ver_var="${pkg}_VERSION"
            echo "- ${pkg}: ${!ver_var}" >> /tmp/commit_msg.txt
          done
          git commit -F /tmp/commit_msg.txt
          git push origin "${{ steps.branch.outputs.BRANCH }}"

      - name: Create pull request
        if: steps.detect.outputs.UPDATES_FOUND == 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT || github.token }}
        run: |
          {
            echo "### Updated packages"
            for pkg in $(echo "${{ steps.detect.outputs.PACKAGES }}" | tr ',' ' '); do
              ver_var="${pkg}_VERSION"
              echo "- **${pkg}**: ${!ver_var}"
            done
            echo ""
            echo "### Version diff"
            echo '```diff'
            cat /tmp/diff_output.txt
            echo '```'
          } > /tmp/pr_body.txt
          gh pr create \
            --title "auto: update packages" \
            --body-file /tmp/pr_body.txt \
            --head "${{ steps.branch.outputs.BRANCH }}" \
            --base main \
            --label dependencies,automated
